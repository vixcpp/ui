name: UI Strict CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - release/**
    paths:
      - ".github/workflows/ui-strict-ci.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "benchmarks/**"
      - "README.md"
      - "CHANGELOG.md"
      - "vix.json"

  pull_request:
    branches:
      - main
      - master
      - dev
      - release/**
    paths:
      - ".github/workflows/ui-strict-ci.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "benchmarks/**"
      - "README.md"
      - "CHANGELOG.md"
      - "vix.json"

  workflow_dispatch:

permissions:
  contents: read

env:
  DEPS: >
    build-essential
    cmake
    ninja-build
    clang
    llvm
    lld
    g++
    cppcheck
    clang-tidy
    valgrind
    pkg-config
    git
    curl
    ca-certificates
    libbenchmark-dev
  BUILD_JOBS: 2
  VIX_GIT_BRANCH: dev

jobs:
  build-test:
    name: Build and Tests (${{ matrix.compiler }}, examples=${{ matrix.examples }})
    runs-on: ubuntu-latest
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
        examples: [ON, OFF]

    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:strict_string_checks=1:check_initialization_order=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - name: Checkout ui repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Fetch sibling template dependency
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ../template

          TEMPLATE_URL="https://github.com/vixcpp/template.git"

          if git ls-remote --exit-code --heads "$TEMPLATE_URL" "${VIX_GIT_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${VIX_GIT_BRANCH}" "$TEMPLATE_URL" ../template
          else
            git clone --depth 1 --branch main "$TEMPLATE_URL" ../template
          fi

          test -f ../template/CMakeLists.txt

      - name: Select compiler
        run: |
          set -euxo pipefail

          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Configure ui
        run: |
          set -euxo pipefail

          cmake -S . -B build-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DUI_BUILD_TESTS=ON \
            -DUI_BUILD_EXAMPLES=${{ matrix.examples }} \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF

      - name: Build ui
        run: |
          set -euxo pipefail
          cmake --build build-tests -j"${BUILD_JOBS}"

      - name: List tests
        run: |
          set -euxo pipefail
          ctest --test-dir build-tests -N

      - name: Run tests
        run: |
          set -euxo pipefail
          ctest --test-dir build-tests --output-on-failure --timeout 120

  runtime-smoke:
    name: Runtime Smoke Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout ui repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Fetch sibling template dependency
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ../template

          TEMPLATE_URL="https://github.com/vixcpp/template.git"

          if git ls-remote --exit-code --heads "$TEMPLATE_URL" "${VIX_GIT_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${VIX_GIT_BRANCH}" "$TEMPLATE_URL" ../template
          else
            git clone --depth 1 --branch main "$TEMPLATE_URL" ../template
          fi

          test -f ../template/CMakeLists.txt

      - name: Configure runtime build
        run: |
          set -euxo pipefail

          cmake -S . -B build-runtime -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DUI_BUILD_TESTS=ON \
            -DUI_BUILD_EXAMPLES=ON \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF

      - name: Build runtime artifacts
        run: |
          set -euxo pipefail
          cmake --build build-runtime -j"${BUILD_JOBS}"

      - name: Run runtime tests
        run: |
          set -euxo pipefail
          ctest --test-dir build-runtime --output-on-failure --timeout 120

      - name: Smoke test non-server executables
        shell: bash
        run: |
          set -euo pipefail

          FAIL=0

          mapfile -t CANDIDATES < <(
            find build-runtime -type f -executable | while read -r exe; do
              base="$(basename "$exe")"

              if [[ "$exe" =~ /CMakeFiles/ ]]; then
                continue
              fi

              if [[ "$base" =~ (cmake|ctest) ]]; then
                continue
              fi

              echo "$exe"
            done | sort -u
          )

          if [ ${#CANDIDATES[@]} -eq 0 ]; then
            echo "::warning::No executable candidates found."
            exit 0
          fi

          for exe in "${CANDIDATES[@]}"; do
            base="$(basename "$exe")"

            if [[ "$base" =~ (server|shell|desktop|webview|listener|daemon) ]]; then
              echo "Skipping server-like or shell-like executable: $exe"
              continue
            fi

            echo "==> Smoke run: $exe"

            set +e
            timeout 8s "$exe" >/tmp/ui_smoke.log 2>&1
            STATUS=$?
            set -e

            cat /tmp/ui_smoke.log || true

            if [ $STATUS -ne 0 ] && [ $STATUS -ne 124 ]; then
              echo "::error::Smoke test failed for $exe with status $STATUS"
              FAIL=1
            fi
          done

          exit "$FAIL"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout ui repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Fetch sibling template dependency
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ../template

          TEMPLATE_URL="https://github.com/vixcpp/template.git"

          if git ls-remote --exit-code --heads "$TEMPLATE_URL" "${VIX_GIT_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${VIX_GIT_BRANCH}" "$TEMPLATE_URL" ../template
          else
            git clone --depth 1 --branch main "$TEMPLATE_URL" ../template
          fi

          test -f ../template/CMakeLists.txt

      - name: Configure analysis build
        run: |
          set -euxo pipefail

          cmake -S . -B build-analyze -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DUI_BUILD_TESTS=ON \
            -DUI_BUILD_EXAMPLES=ON \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF

      - name: Build analysis target
        run: |
          set -euxo pipefail
          cmake --build build-analyze -j"${BUILD_JOBS}"

      - name: Run clang-tidy
        run: |
          set +e

          mapfile -d '' FILES < <(find src tests examples -name '*.cpp' -print0)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No C++ files found for clang-tidy."
            exit 1
          fi

          clang-tidy -p build-analyze "${FILES[@]}"
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "::warning::clang-tidy reported issues."
          else
            echo "clang-tidy completed successfully."
          fi

          exit 0

      - name: Run cppcheck on library code
        run: |
          set -euxo pipefail

          cppcheck \
            --enable=warning,performance,portability \
            --std=c++20 \
            --inconclusive \
            --error-exitcode=2 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            include/ src/

      - name: Run cppcheck style report
        run: |
          set +e

          cppcheck \
            --enable=style \
            --std=c++20 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            include/ src/ tests/ examples/

          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "::warning::cppcheck style report found issues."
          else
            echo "cppcheck style report completed successfully."
          fi

          exit 0

  valgrind:
    name: Valgrind Memory Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout ui repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Fetch sibling template dependency
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ../template

          TEMPLATE_URL="https://github.com/vixcpp/template.git"

          if git ls-remote --exit-code --heads "$TEMPLATE_URL" "${VIX_GIT_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${VIX_GIT_BRANCH}" "$TEMPLATE_URL" ../template
          else
            git clone --depth 1 --branch main "$TEMPLATE_URL" ../template
          fi

          test -f ../template/CMakeLists.txt

      - name: Configure valgrind build
        run: |
          set -euxo pipefail

          cmake -S . -B build-valgrind -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DUI_BUILD_TESTS=ON \
            -DUI_BUILD_EXAMPLES=OFF \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF

      - name: Build valgrind targets
        run: |
          set -euxo pipefail
          cmake --build build-valgrind -j"${BUILD_JOBS}"

      - name: List tests before valgrind
        run: |
          set -euxo pipefail
          ctest --test-dir build-valgrind -N

      - name: Run valgrind on test executables
        shell: bash
        run: |
          set -euo pipefail

          FAIL=0

          mapfile -t TEST_BINS < <(
            find build-valgrind -type f -executable 2>/dev/null \
              | grep -E '(test|tests)' \
              | grep -Ev '(/CMakeFiles/|_bench$|bench$)' \
              | sort
          )

          if [ ${#TEST_BINS[@]} -eq 0 ]; then
            echo "::warning::No test executables found for valgrind."
            exit 0
          fi

          for exe in "${TEST_BINS[@]}"; do
            echo "==> Valgrind: $exe"

            set +e
            timeout 120s valgrind \
              --leak-check=full \
              --show-leak-kinds=all \
              --track-origins=yes \
              --errors-for-leak-kinds=definite,indirect,possible \
              --error-exitcode=99 \
              "$exe"
            STATUS=$?
            set -e

            if [ $STATUS -ne 0 ]; then
              echo "::error::Valgrind failed for $exe with status $STATUS"
              FAIL=1
            fi
          done

          exit "$FAIL"

  release-and-bench:
    name: Release and Benchmark Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout ui repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Fetch sibling template dependency
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ../template

          TEMPLATE_URL="https://github.com/vixcpp/template.git"

          if git ls-remote --exit-code --heads "$TEMPLATE_URL" "${VIX_GIT_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${VIX_GIT_BRANCH}" "$TEMPLATE_URL" ../template
          else
            git clone --depth 1 --branch main "$TEMPLATE_URL" ../template
          fi

          test -f ../template/CMakeLists.txt

      - name: Configure release tests
        run: |
          set -euxo pipefail

          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DUI_BUILD_TESTS=ON \
            -DUI_BUILD_EXAMPLES=ON \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF

      - name: Build release tests
        run: |
          set -euxo pipefail
          cmake --build build-release -j"${BUILD_JOBS}"

      - name: Run release tests
        run: |
          set -euxo pipefail
          ctest --test-dir build-release --output-on-failure --timeout 120

      - name: Configure benchmark build
        run: |
          set -euxo pipefail

          cmake -S . -B build-bench -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DUI_BUILD_TESTS=ON \
            -DUI_BUILD_EXAMPLES=OFF \
            -DUI_BUILD_BENCHMARKS=ON \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF

      - name: Build benchmarks
        run: |
          set -euxo pipefail
          cmake --build build-bench -j"${BUILD_JOBS}"

      - name: Verify benchmark executables
        run: |
          set -euxo pipefail

          find build-bench -type f -executable | sort

          COUNT="$(find build-bench -type f -executable | grep -c 'bench' || true)"

          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::No benchmark executable found."
          else
            echo "Benchmark executable count: $COUNT"
          fi

  package-export:
    name: Package Export Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout ui repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Fetch and install template dependency
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ../template .ci-deps

          TEMPLATE_URL="https://github.com/vixcpp/template.git"

          if git ls-remote --exit-code --heads "$TEMPLATE_URL" "${VIX_GIT_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${VIX_GIT_BRANCH}" "$TEMPLATE_URL" ../template
          else
            git clone --depth 1 --branch main "$TEMPLATE_URL" ../template
          fi

          test -f ../template/CMakeLists.txt

          cmake -S ../template -B ../template/build-install -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTEMPLATE_BUILD_TESTS=OFF \
            -DTEMPLATE_BUILD_EXAMPLES=OFF \
            -DTEMPLATE_INSTALL=ON \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/.ci-deps"

          cmake --build ../template/build-install -j"${BUILD_JOBS}"
          cmake --install ../template/build-install

          find .ci-deps -maxdepth 8 -type f | sort

      - name: Configure installable ui package
        run: |
          set -euxo pipefail

          cmake -S . -B build-install -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH="${PWD}/.ci-deps" \
            -DUI_BUILD_TESTS=OFF \
            -DUI_BUILD_EXAMPLES=OFF \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF \
            -DCMAKE_INSTALL_PREFIX="${PWD}/.ci-install"

      - name: Build installable package
        run: |
          set -euxo pipefail
          cmake --build build-install -j"${BUILD_JOBS}"

      - name: Install package
        run: |
          set -euxo pipefail
          cmake --install build-install

      - name: Verify install tree
        run: |
          set -euxo pipefail

          find .ci-install -maxdepth 8 -type f | sort

          test -d .ci-install/include/vix
          test -f .ci-install/lib/cmake/ui/uiTargets.cmake
          test -f .ci-install/lib/cmake/ui/uiConfig.cmake
          test -f .ci-install/lib/cmake/ui/uiConfigVersion.cmake

      - name: Verify package consumption
        run: |
          set -euxo pipefail

          mkdir -p .ci-consumer

          cat > .ci-consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)

          project(ui_consumer LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          find_package(ui CONFIG REQUIRED)

          add_executable(ui_consumer main.cpp)
          target_link_libraries(ui_consumer PRIVATE vix::ui)
          EOF

          cat > .ci-consumer/main.cpp <<'EOF'
          int main()
          {
            return 0;
          }
          EOF

          cmake -S .ci-consumer -B .ci-consumer/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${PWD}/.ci-install;${PWD}/.ci-deps"

          cmake --build .ci-consumer/build -j"${BUILD_JOBS}"

  summary:
    name: UI Strict CI Summary
    needs:
      - build-test
      - runtime-smoke
      - static-analysis
      - valgrind
      - release-and-bench
      - package-export
    runs-on: ubuntu-latest

    steps:
      - name: Print summary
        run: |
          echo "UI strict CI completed successfully."
          echo "- Debug builds with clang and gcc"
          echo "- Tests with examples ON and OFF"
          echo "- Runtime smoke checks"
          echo "- Static analysis"
          echo "- Valgrind memory checks"
          echo "- Release tests"
          echo "- Benchmark build coverage"
          echo "- Standalone package export check"
          echo "- Consumer project find_package(ui CONFIG REQUIRED)"
